<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Assist SDK — Vanilla JS Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; color: #1a1a1a; padding: 40px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #6b7280; margin-bottom: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-start { background: #124e3f; color: white; }
    .btn-start:hover { background: #0d3a2e; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-stop:hover { background: #dc2626; }
    .btn-stop:disabled, .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
    #transcript { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; min-height: 200px; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
    .entry { padding: 4px 0; }
    .entry-mic { color: #124e3f; }
    .entry-tab { color: #8b5cf6; }
    .label { font-weight: 700; font-size: 11px; margin-right: 8px; }
    #feedback { margin-top: 16px; padding: 16px; background: white; border: 1px solid #e5e7eb; border-radius: 12px; font-size: 13px; }
    #feedback h3 { font-size: 14px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Live Assist SDK — Vanilla JS</h1>
  <p>Uses the core SDK directly without React. Start a session and speak into your microphone.</p>

  <div class="controls">
    <button id="startBtn" class="btn-start" onclick="startSession()">Start Session</button>
    <button id="stopBtn" class="btn-stop" onclick="stopSession()" disabled>Stop Session</button>
  </div>

  <div id="status">Ready</div>
  <div id="transcript"></div>
  <div id="feedback" style="display: none;">
    <h3>AI Feedback</h3>
    <div id="feedbackText"></div>
  </div>

  <script type="module">
    // In a real setup, import from the built SDK package.
    // Here we inline the session creation for demonstration.
    // Replace with: import { createLiveAssistSession } from '@whissle/live-assist-core';

    const ASR_URL = "ws://localhost:8001/asr/stream";
    const AGENT_URL = "http://localhost:8765";

    let session = null;

    window.startSession = async function () {
      document.getElementById("startBtn").disabled = true;
      document.getElementById("stopBtn").disabled = false;
      document.getElementById("status").textContent = "Connecting...";
      document.getElementById("transcript").innerHTML = "";
      document.getElementById("feedback").style.display = "none";

      // Dynamic import of the SDK (adjust path for your setup)
      const { createLiveAssistSession } = await import("../../packages/core/dist/index.js");

      session = createLiveAssistSession({ asrUrl: ASR_URL, agentUrl: AGENT_URL });

      session.on("transcript", (entry) => {
        const div = document.createElement("div");
        div.className = `entry entry-${entry.channel}`;
        div.innerHTML = `<span class="label">${entry.channel === "mic" ? "YOU" : "OTHER"}</span>${entry.text}`;
        document.getElementById("transcript").appendChild(div);
        document.getElementById("transcript").scrollTop = document.getElementById("transcript").scrollHeight;
      });

      session.on("feedback", (fb) => {
        if (fb.summary) {
          document.getElementById("feedback").style.display = "block";
          document.getElementById("feedbackText").textContent = fb.summary;
        }
      });

      session.on("error", (err) => {
        document.getElementById("status").textContent = `Error: ${err.message}`;
      });

      try {
        await session.start();
        document.getElementById("status").textContent = "Listening...";
      } catch (e) {
        document.getElementById("status").textContent = `Failed: ${e.message}`;
        document.getElementById("startBtn").disabled = false;
        document.getElementById("stopBtn").disabled = true;
      }
    };

    window.stopSession = async function () {
      if (!session) return;
      document.getElementById("status").textContent = "Stopping...";
      const report = await session.stop();
      document.getElementById("status").textContent = "Session ended";
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
      console.log("Session report:", report);
    };
  </script>
</body>
</html>
