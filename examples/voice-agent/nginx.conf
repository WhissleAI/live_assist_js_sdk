server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Security headers — defined as variables so child blocks can reuse
    set $csp "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.whissle.ai wss://api.whissle.ai https://*.cartesia.ai wss://*.cartesia.ai https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; frame-ancestors 'self' *.whissle.ai; object-src 'none'; base-uri 'self'";

    add_header Content-Security-Policy $csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # Health check for Cloud Run
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        add_header Content-Security-Policy $csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
        return 200 'ok';
    }

    # Static assets — long cache (repeat security headers since nginx replaces in child blocks)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Content-Security-Policy $csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }

    # Favicon fallback
    location = /favicon.ico {
        try_files $uri /favicon.svg;
    }

    # Static files for SEO/PWA
    location = /robots.txt {
        try_files $uri =404;
    }

    location = /manifest.json {
        try_files $uri =404;
        add_header Content-Type "application/manifest+json";
        add_header Content-Security-Policy $csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy $csp always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;
    }
}
