# Live Assist — Build from source (for developers / CI)
# Run from live_assist repo root. Requires models at models/asr_onnx_export/
#
# Usage (from live_assist root):
#   docker compose -f live_assist_js_sdk/docker/docker-compose.build.yml build
#   GEMINI_API_KEY=xxx docker compose -f live_assist_js_sdk/docker/docker-compose.build.yml up -d

services:
  live-assist:
    build:
      context: ../..
      dockerfile: Dockerfile.unified
    image: whissleasr/live-assist:latest
    container_name: live-assist
    ports:
      - "8001:8001"
      - "8765:8765"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DB_PATH=/app/data/live_assist.db
      - SESSIONS_DIR=/app/data/sessions
    volumes:
      - live-assist-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ && curl -f http://localhost:8765/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  live-assist-data:
