[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:asr]
command=uvicorn src.server:app --host 0.0.0.0 --port 8001
directory=/app/asr
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:agent]
command=uvicorn app.main:app --host 0.0.0.0 --port 8765
directory=/app/server
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:voice-agent]
command=python /app/serve_static.py --dir /app/voice-agent-ui --port 5174
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
